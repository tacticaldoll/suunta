# cargo-deny owns resolved supply-chain policy for the workspace.
# Run: `cargo deny check`.

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Unlicense", "Unicode-3.0"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
